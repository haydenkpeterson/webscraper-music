name: Import Preset Request

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  import:
    if: startsWith(github.event.issue.title, 'Preset request:') && github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import preset request
        run: npm run preset:import-request

      - name: Commit preset store
        id: commit
        run: |
          if git diff --quiet -- data/presets.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/presets.json
          git commit -m "Add preset from issue #${{ github.event.issue.number }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment and close issue
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Preset imported successfully. The Pages workflow will refresh the snapshot with this preset on the next deploy.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
